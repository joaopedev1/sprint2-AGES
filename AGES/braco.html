<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Braço</title>
  <link rel="stylesheet" href="braco.css">
</head>
<body>
 
  <div class="braco-wrap">
 
    <!--
      CAMADA 1 — antebraço animado (imagem completa por baixo)
      Gira a partir do cotovelo
    -->
    <img src="braçoteste.png" class="braco-baixo" id="braco-baixo" alt="">
 
    <!--
      CAMADA 2 — braço superior + cotovelo estático (mesma imagem por cima)
      clip-path corta tudo abaixo do cotovelo, mostrando só a parte de cima
    -->
    <img src="braçoteste.png" class="braco-cima" alt="">
 
  </div>
 
</body>
</html>
